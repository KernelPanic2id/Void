// Void — Signaling Server Data Schema
// Protocol Buffers v3 definition — mirrors the prost::Message structs
// defined in store.rs and models.rs (Rust derive-based, no protoc needed).
//
// This file serves as the canonical, language-agnostic reference for the
// binary wire format used for both on-disk persistence (.bin snapshots)
// and client↔server content negotiation (Accept: application/x-protobuf).
//
// Interoperability: this .proto file can be compiled with `protoc` to
// generate typed bindings for any language (Go, Python, Java, C#, etc.),
// enabling future services or micro-services to read, write and exchange
// data with the existing Void store without reverse-engineering the binary
// format. The schema IS the contract.
//
// Tag numbers MUST stay in sync with the Rust prost attributes.

syntax = "proto3";
package void.store;

// ===========================================================================
// Persistence layer — serialized to auth_store.bin
// ===========================================================================

// Root envelope written atomically to disk by the background flusher.
message StoreSnapshot {
  repeated UserRecord users   = 1;
  repeated FriendRecord friends = 2;
}

// Single user account.
// PK: id (UUID v4).  Secondary indexes: username, public_key.
message UserRecord {
  string id            = 1; // UUID v4 — primary key
  string username      = 2; // Unique, lowercased login name
  string display_name  = 3; // User-facing name (original case)
  string password_hash = 4; // Argon2id hash (never exposed to clients)
  optional string avatar     = 5; // Base64 data-URI (max 512 KB)
  string public_key          = 6; // Ed25519 public key (base64, 44 chars) — mandatory
  int64  created_at_ms = 7; // UNIX epoch milliseconds
}

// Friendship or pending request between two users.
// PK: id (UUID v4).  FK: from_user_id → UserRecord.id,
//                         to_user_id  → UserRecord.id.
message FriendRecord {
  string id            = 1; // UUID v4 — primary key
  string from_user_id  = 2; // FK → UserRecord.id (sender)
  string to_user_id    = 3; // FK → UserRecord.id (recipient)
  string status        = 4; // "pending" | "accepted" | "rejected"
  int64  created_at_ms = 5; // UNIX epoch milliseconds
}

// ===========================================================================
// Server registry — serialized to servers.json (JSON, not protobuf)
// ===========================================================================

// Voice/text server (guild equivalent).
// PK: id (UUID v4).  FK: owner_public_key → UserRecord.public_key.
// Relation: members[] contains UserRecord.public_key values (N:M).
message Server {
  string id                = 1;
  string name              = 2;
  string owner_public_key  = 3; // FK → UserRecord.public_key
  string invite_key        = 4; // Unique invite code
  optional string icon     = 5;
  repeated ServerChannel channels = 6;
  repeated string members  = 7; // List of UserRecord.public_key (N:M)
}

message ServerChannel {
  string id   = 1;
  string name = 2;
  string type = 3; // "text" | "voice"
}

// ===========================================================================
// API response messages — wire format for content negotiation
// ===========================================================================

// Returned after POST /api/auth/register or /login.
message AuthResponse {
  string token              = 1; // JWT HS256, 7-day expiry
  optional UserProfile user = 2;
}

// Public user profile (no password_hash).
message UserProfile {
  string id            = 1;
  string username      = 2;
  string display_name  = 3;
  optional string avatar     = 4;
  optional string public_key = 5;
  int64  created_at_ms = 6;
}

// Minimal user info for search results and friend lists.
message UserSummary {
  string id           = 1;
  string username     = 2;
  string display_name = 3;
  optional string avatar     = 4;
  optional string public_key = 5;
}

message UserSummaryList {
  repeated UserSummary items = 1;
}

// Incoming friend request with embedded sender profile.
message PendingRequest {
  string id                    = 1;
  optional UserSummary from    = 2;
  int64  created_at_ms         = 3;
}

message PendingRequestList {
  repeated PendingRequest items = 1;
}

// ===========================================================================
// API request messages
// ===========================================================================

message RegisterBody {
  string username     = 1;
  string password     = 2;
  string display_name = 3;
  optional string public_key = 4;
}

message LoginBody {
  string username = 1;
  string password = 2;
  optional string public_key = 3;
}

message UpdateProfileBody {
  optional string display_name = 1;
  optional string avatar       = 2;
}

message FriendRequestBody {
  string to_user_id = 1;
}

// ===========================================================================
// Generic responses
// ===========================================================================

message StatusResponse {
  string status = 1;
}

message FriendRequestResult {
  string id     = 1;
  string status = 2;
}

message RemovedResponse {
  bool removed = 1;
}


