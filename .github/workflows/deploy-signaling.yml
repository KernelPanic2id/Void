name: Deploy Signaling Server

on:
  push:
    branches:
      - main
    paths:
      - 'packages/signaling-server/**'
      - '.github/workflows/deploy-signaling.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Archive project for transfer
        run: |
          tar -czvf deploy.tar.gz \
            --exclude='target' \
            --exclude='node_modules' \
            --exclude='.git' \
            .

      - name: Copy archive to Oracle VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Extract, Build and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # 1. Extraction
            mkdir -p ~/discordWASM
            tar -xzvf ~/deploy.tar.gz -C ~/discordWASM
            cd ~/discordWASM
            
            # 2. Injection des Secrets pour le build Docker
            export PRIMARY_PIN_HASH="${{ secrets.PRIMARY_PIN_HASH }}"
            export BACKUP_PIN_HASH="${{ secrets.BACKUP_PIN_HASH }}"
            
            # 3. Build et Relance avec héritage d'environnement
            sudo -E docker compose up -d --build signaling-server
            
            # 4. Nettoyage
            sudo docker image prune -f
            rm ~/deploy.tar.gz