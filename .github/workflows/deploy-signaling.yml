name: Deploy Signaling Server + Monitoring

on:
  push:
    branches:
      - main
    paths:
      - 'packages/signaling-server/**'
      - 'packages/void-sfu/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/deploy-signaling.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker/**'
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: stable
  TARGET_PLATFORM: aarch64-unknown-linux-gnu

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
      BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run void-sfu tests
        run: cargo test -p void-sfu --verbose

      - name: Run signaling-server tests
        run: cargo test -p signaling-server --verbose

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_PLATFORM }}

      - name: Install ARM64 Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Binary (ARM64)
        env:
          PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
          BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ env.TARGET_PLATFORM }} -p signaling-server

      - name: Prepare Deployment Package
        run: |
          mkdir -p deploy-package/docker/grafana/provisioning/datasources
          mkdir -p deploy-package/docker/grafana/provisioning/dashboards
          cp target/${{ env.TARGET_PLATFORM }}/release/signaling-server deploy-package/
          cp Dockerfile deploy-package/
          cp docker-compose.yml deploy-package/
          find . -name "prometheus.yml" -exec cp {} deploy-package/docker/ \;
          find . -name "alert_rules.yml" -exec cp {} deploy-package/docker/ \;
          find . -name "alertmanager.yml" -exec cp {} deploy-package/docker/ \;
          find . -name "datasources.yml" -exec cp {} deploy-package/docker/grafana/provisioning/datasources/ \;
          find . -name "dashboard.yml" -exec cp {} deploy-package/docker/grafana/provisioning/dashboards/ \;
          find . -name "sfu-dashboard.json" -exec cp {} deploy-package/docker/grafana/provisioning/dashboards/ \;
          tar -czvf deploy.tar.gz -C deploy-package .

      - name: Copy to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo "=== Déploiement SFU + Monitoring ==="
            mkdir -p ~/Void
            cd ~/Void
            sudo chown -R ubuntu:ubuntu ~/Void
            rm -rf docker/
            tar -xzvf ~/deploy.tar.gz
            rm ~/deploy.tar.gz

            # Création du fichier .env propre
            cat > .env << ENVEOF
            PRIMARY_PIN_HASH="${{ secrets.PRIMARY_PIN_HASH }}"
            BACKUP_PIN_HASH="${{ secrets.BACKUP_PIN_HASH }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            SMTP_AUTH_PASSWORD="${{ secrets.SMTP_AUTH_PASSWORD }}"
            SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"
            GF_ADMIN_PASSWORD="${{ secrets.GF_ADMIN_PASSWORD }}"
            PUBLIC_IP="${{ secrets.PUBLIC_IP }}"
            ENVEOF
            chmod 600 .env

            # Patch Alertmanager
            sed -i "s|REPLACE_SMTP_USER|${{ secrets.SMTP_EMAIL }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_SMTP_PASSWORD|${{ secrets.SMTP_AUTH_PASSWORD }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_SLACK_WEBHOOK|${{ secrets.SLACK_WEBHOOK_URL }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_DOMAIN|${{ secrets.DOMAIN }}|g" docker/alertmanager.yml

            sudo docker compose down || true
            sudo docker compose build --no-cache signaling-server
            sudo docker compose up -d

            echo "Attente de démarrage (30s)..."
            sleep 30

            echo "=== Tests de santé ==="
            # CORRECTION : Changement de https:// à http:// car Nginx n'est pas utilisé en local ici
            curl -f --max-time 10 http://localhost:3001/health && echo "✅ Signaling OK" || exit 1
            curl -s http://localhost:9090/-/healthy | grep -q "Healthy" && echo "✅ Prometheus OK" || exit 1
            curl -s http://localhost:3000/api/health | grep -q "ok" && echo "✅ Grafana OK" || exit 1
            
            sudo docker image prune -f
            echo "🚀 Déploiement terminé avec succès !"

  notify:
    needs: build-and-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Déploiement SFU: ${{ job.status }} (Commit: ${{ github.event.head_commit.message }})"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}