name: Deploy Signaling Server + Monitoring

on:
  push:
    branches:
      - main
    paths:
      - 'packages/signaling-server/**'
      - '.github/workflows/deploy-signaling.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker/**'  # ← Ajout pour monitoring
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: stable
  TARGET_PLATFORM: aarch64-unknown-linux-gnu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_PLATFORM }}

      - name: Install ARM64 Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Binary (ARM64)
        env:
          PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
          BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ env.TARGET_PLATFORM }} -p signaling-server

      - name: Verify Binary
        run: |
          file target/${{ env.TARGET_PLATFORM }}/release/signaling-server
          ldd target/${{ env.TARGET_PLATFORM }}/release/signaling-server

      - name: Prepare Deployment Package
        run: |
          echo "Creating deployment package..."
          
          # Structure du tarball
          mkdir -p deploy-package
          
          # Binaire
          cp target/${{ env.TARGET_PLATFORM }}/release/signaling-server deploy-package/
          
          # Docker files
          cp Dockerfile deploy-package/
          cp docker-compose.yml deploy-package/
          
          # Monitoring stack (docker/)
          cp -r docker deploy-package/
          
          # .env template (sans secrets)
          cp .env.example deploy-package/.env.example 2>/dev/null || echo "No .env.example"
          
          # Créer le tarball
          tar -czvf deploy.tar.gz \
            -C deploy-package .
          
          # Afficher le contenu
          tar -tzvf deploy.tar.gz | head -20

      - name: Copy to Oracle VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu"
          strip_components: 0

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo "=== Déploiement SFU + Monitoring ==="
            
            # 1. Préparation
            mkdir -p ~/discordWASM
            cd ~/discordWASM
            
            # 2. Nettoyage de l'ancien binaire
            rm -f signaling-server
            
            # 3. Extraction
            tar -xzvf ~/deploy.tar.gz
            rm ~/deploy.tar.gz
            
            # 4. Charger les secrets depuis GitHub
            echo "Chargement des secrets..."
            cat > .env << EOF
            PRIMARY_PIN_HASH=${{ secrets.PRIMARY_PIN_HASH }}
            BACKUP_PIN_HASH=${{ secrets.BACKUP_PIN_HASH }}
            SMTP_AUTH_PASSWORD=${{ secrets.SMTP_AUTH_PASSWORD }}
            SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
            EOF
            chmod 600 .env
            
            # 5. Arrêt des anciens conteneurs
            echo "Arrêt des anciens services..."
            sudo docker compose down || true
            
            # 6. Build et démarrage des services
            echo "Build et démarrage des services..."
            sudo docker compose build --no-cache signaling-server
            sudo docker compose up -d
            
            # 7. Attendre le démarrage (30 secondes)
            echo "Attente du démarrage des services..."
            sleep 30
            
            # 8. Healthcheck
            echo "=== Vérification des services ==="
            
            # Vérifier le backend
            if curl -fk --max-time 10 https://localhost:3001/health; then
              echo "✅ Signaling Server: OK"
            else
              echo "❌ Signaling Server: FAILED"
              sudo docker compose logs --tail=50 signaling-server
              exit 1
            fi
            
            # Vérifier Prometheus
            if curl -s --max-time 10 http://localhost:9090/-/healthy | grep -q "Prometheus Server is Healthy"; then
              echo "✅ Prometheus: OK"
            else
              echo "❌ Prometheus: FAILED"
              sudo docker compose logs --tail=50 prometheus
              exit 1
            fi
            
            # Vérifier Grafana
            if curl -s --max-time 10 http://localhost:3000/api/health | grep -q "ok"; then
              echo "✅ Grafana: OK"
            else
              echo "❌ Grafana: FAILED"
              sudo docker compose logs --tail=50 grafana
              exit 1
            fi
            
            # Vérifier Alertmanager
            if curl -s --max-time 10 http://localhost:9093/-/healthy | grep -q "Healthy"; then
              echo "✅ Alertmanager: OK"
            else
              echo "❌ Alertmanager: FAILED"
              sudo docker compose logs --tail=50 alertmanager
              exit 1
            fi
            
            # 9. Vérifier les targets Prometheus
            echo "=== Vérification des targets Prometheus ==="
            curl -s http://localhost:9090/api/v1/targets | jq '.data.activeTargets[] | select(.labels.job == "signaling-server") | {job: .labels.job, health: .health, scrapeUrl: .scrapeUrl}' || true
            
            # 10. Ménage
            echo "=== Nettoyage ==="
            sudo docker image prune -f
            sudo docker system prune -f
            
            # 11. Résumé
            echo "=== Déploiement terminé ==="
            echo "📊 URLs d'accès:"
            echo "  - SFU Backend:  https://${{ secrets.ORACLE_HOST }}:3001"
            echo "  - Prometheus:   http://${{ secrets.ORACLE_HOST }}:9090"
            echo "  - Grafana:      http://${{ secrets.ORACLE_HOST }}:3000"
            echo "  - Alertmanager: http://${{ secrets.ORACLE_HOST }}:9093"
            
            echo "✅ Déploiement réussi !"

  notify:
    needs: build-and-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            :robot: Déploiement SFU + Monitoring
            :rocket: *Workflow:* ${{ github.workflow }}
            :book: *Commit:* ${{ github.event.head_commit.message }}
            :person: *Author:* ${{ github.actor }}
            :clock: *Duration:* ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: failure() || success()