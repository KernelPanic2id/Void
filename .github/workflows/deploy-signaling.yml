name: Deploy Signaling Server + Monitoring

on:
  push:
    branches:
      - main
    paths:
      - 'packages/signaling-server/**'
      - '.github/workflows/deploy-signaling.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker/**'
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: stable
  TARGET_PLATFORM: aarch64-unknown-linux-gnu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_PLATFORM }}

      - name: Install ARM64 Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Binary (ARM64)
        env:
          PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
          BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ env.TARGET_PLATFORM }} -p signaling-server

      - name: Verify Binary
        run: |
          echo "=== Vérification du binaire ==="
          file target/${{ env.TARGET_PLATFORM }}/release/signaling-server
          ls -lh target/${{ env.TARGET_PLATFORM }}/release/signaling-server

      - name: Prepare Deployment Package
        run: |
          echo "Creating deployment package..."
          mkdir -p deploy-package
          cp target/${{ env.TARGET_PLATFORM }}/release/signaling-server deploy-package/
          cp Dockerfile deploy-package/
          cp docker-compose.yml deploy-package/
          cp -r docker deploy-package/
          cp .env.example deploy-package/.env.example 2>/dev/null || echo "No .env.example"
          tar -czvf deploy.tar.gz -C deploy-package .
          echo "=== Contenu du tarball ==="
          tar -tzvf deploy.tar.gz | head -20

      - name: Copy to Oracle VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo "=== Déploiement SFU + Monitoring ==="
            mkdir -p ~/discordWASM
            cd ~/discordWASM
            rm -f signaling-server
            tar -xzvf ~/deploy.tar.gz
            rm ~/deploy.tar.gz
            echo "Chargement des secrets..."
            cat > .env << ENVEOF
            PRIMARY_PIN_HASH="${{ secrets.PRIMARY_PIN_HASH }}"
            BACKUP_PIN_HASH="${{ secrets.BACKUP_PIN_HASH }}"
            SMTP_AUTH_PASSWORD="${{ secrets.SMTP_AUTH_PASSWORD }}"
            SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"
            ENVEOF
            chmod 600 .env
            echo "=== Contenu du fichier .env ==="
            cat .env | sed 's/=.*/="***"/'
            echo "Arrêt des anciens services..."
            sudo docker compose --env-file .env down || true
            echo "Build et démarrage des services..."
            sudo docker compose --env-file .env build --no-cache signaling-server
            sudo docker compose --env-file .env up -d
            echo "Attente du démarrage des services..."
            sleep 30
            echo "=== Vérification des services ==="
            if curl -fk --max-time 10 https://localhost:3001/health; then
              echo " Signaling Server: OK"
            else
              echo " Signaling Server: FAILED"
              sudo docker compose --env-file .env logs --tail=50 signaling-server
              exit 1
            fi
            if curl -s --max-time 10 http://localhost:9090/-/healthy | grep -q "Prometheus Server is Healthy"; then
              echo " Prometheus: OK"
            else
              echo " Prometheus: FAILED"
              sudo docker compose --env-file .env logs --tail=50 prometheus
              exit 1
            fi
            if curl -s --max-time 10 http://localhost:3000/api/health | grep -q "ok"; then
              echo " Grafana: OK"
            else
              echo " Grafana: FAILED"
              sudo docker compose --env-file .env logs --tail=50 grafana
              exit 1
            fi
            if curl -s --max-time 10 http://localhost:9093/-/healthy | grep -q "Healthy"; then
              echo "Alertmanager: OK"
            else
              echo "Alertmanager: FAILED"
              sudo docker compose --env-file .env logs --tail=50 alertmanager
              exit 1
            fi
            echo "=== Vérification des targets Prometheus ==="
            curl -s http://localhost:9090/api/v1/targets | jq '.data.activeTargets[] | select(.labels.job == "signaling-server") | {job: .labels.job, health: .health, scrapeUrl: .scrapeUrl}' || true
            echo "=== Nettoyage ==="
            sudo docker image prune -f
            sudo docker system prune -f
            echo "=== Déploiement terminé ==="
            echo "URLs d'accès:"
            echo "  - SFU Backend:  https://${{ secrets.ORACLE_HOST }}:3001"
            echo "  - Prometheus:   http://${{ secrets.ORACLE_HOST }}:9090"
            echo "  - Grafana:      http://${{ secrets.ORACLE_HOST }}:3000"
            echo "  - Alertmanager: http://${{ secrets.ORACLE_HOST }}:9093"
            echo " Déploiement réussi !"

  notify:
    needs: build-and-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            :robot: Déploiement SFU + Monitoring
            :rocket: *Workflow:* ${{ github.workflow }}
            :book: *Commit:* ${{ github.event.head_commit.message }}
            :person: *Author:* ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}