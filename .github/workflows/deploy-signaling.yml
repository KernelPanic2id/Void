name: Deploy Signaling Server + Monitoring

on:
  push:
    branches:
      - main
    paths:
      - 'packages/signaling-server/**'
      - '.github/workflows/deploy-signaling.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker/**'
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: stable
  TARGET_PLATFORM: aarch64-unknown-linux-gnu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_PLATFORM }}

      - name: Install ARM64 Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Binary (ARM64)
        env:
          PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
          BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ env.TARGET_PLATFORM }} -p signaling-server

      - name: Prepare Deployment Package
        run: |
          echo "=== Construction du package de déploiement ==="
          mkdir -p deploy-package/docker/grafana/provisioning/datasources
          mkdir -p deploy-package/docker/grafana/provisioning/dashboards
          
          # 1. Copie du binaire et fichiers racines
          cp target/${{ env.TARGET_PLATFORM }}/release/signaling-server deploy-package/
          cp Dockerfile deploy-package/
          cp docker-compose.yml deploy-package/
          
          # 2. Copie des configs Prometheus / Alertmanager
          # On cherche dans 'docker/' ou à la racine selon ton repo
          cp docker/prometheus.yml deploy-package/docker/ 2>/dev/null || cp prometheus.yml deploy-package/docker/
          cp docker/alert_rules.yml deploy-package/docker/ 2>/dev/null || cp alert_rules.yml deploy-package/docker/
          cp docker/alertmanager.yml deploy-package/docker/ 2>/dev/null || cp alertmanager.yml deploy-package/docker/
          
          # 3. Copie précise du Provisioning Grafana (C'est ici que ça bloquait)
          cp docker/grafana/provisioning/datasources/*.yml deploy-package/docker/grafana/provisioning/datasources/ 2>/dev/null || echo "⚠️ Pas de datasources"
          cp docker/grafana/provisioning/dashboards/*.yml deploy-package/docker/grafana/provisioning/dashboards/ 2>/dev/null || echo "⚠️ Pas de dashboard.yml"
          cp docker/grafana/provisioning/dashboards/*.json deploy-package/docker/grafana/provisioning/dashboards/ 2>/dev/null || echo "⚠️ Pas de dashboard JSON"
          
          # Création de l'archive
          tar -czvf deploy.tar.gz -C deploy-package .

      - name: Copy to Oracle VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo "=== Déploiement SFU + Monitoring ==="
            mkdir -p ~/discordWASM
            cd ~/discordWASM
            
            # Nettoyage avant extraction
            tar -xzvf ~/deploy.tar.gz
            rm ~/deploy.tar.gz

            # 1. Création du fichier .env (Secrets)
            cat > .env << ENVEOF
            PRIMARY_PIN_HASH="${{ secrets.PRIMARY_PIN_HASH }}"
            BACKUP_PIN_HASH="${{ secrets.BACKUP_PIN_HASH }}"
            SMTP_AUTH_PASSWORD="${{ secrets.SMTP_AUTH_PASSWORD }}"
            SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"
            ENVEOF
            chmod 600 .env

            # 2. Patch Alertmanager
            sed -i "s|REPLACE_SMTP_USER|${{ secrets.SMTP_EMAIL }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_SMTP_PASSWORD|${{ secrets.SMTP_AUTH_PASSWORD }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_SLACK_WEBHOOK|${{ secrets.SLACK_WEBHOOK_URL }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_DOMAIN|${{ secrets.DOMAIN }}|g" docker/alertmanager.yml

            echo "=== Redémarrage des conteneurs ==="
            sudo docker compose down || true
            
            # ⚠️ CRUCIAL : On supprime le volume Grafana pour forcer le re-chargement du provisioning
            sudo docker volume rm discordwasm_grafana_data || true
            
            sudo docker compose build --no-cache signaling-server
            sudo docker compose up -d

            echo "Attente de 30s pour le démarrage..."
            sleep 30

            echo "=== Vérification des Healthchecks ==="
            # 1. Signaling
            curl -fk --max-time 10 https://localhost:3001/health && echo "✅ Signaling: OK" || exit 1
            # 2. Prometheus
            curl -s http://localhost:9090/-/healthy | grep -q "Healthy" && echo "✅ Prometheus: OK" || exit 1
            # 3. Grafana
            curl -s http://localhost:3000/api/health | grep -q "ok" && echo "✅ Grafana: OK" || exit 1
            
            sudo docker image prune -f
            echo "🚀 Déploiement terminé avec succès !"

  notify:
    needs: build-and-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            :robot: Déploiement SFU + Monitoring
            :rocket: *Statut:* ${{ job.status }}
            :book: *Commit:* ${{ github.event.head_commit.message }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}