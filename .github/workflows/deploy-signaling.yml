- name: Extract, Build and Restart Docker container
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.ORACLE_HOST }}
      username: ubuntu
      key: ${{ secrets.ORACLE_SSH_KEY }}
      script: |
        # Extraction
        mkdir -p ~/discordWASM
        tar -xzvf ~/discordWASM-deploy/deploy.tar.gz -C ~/discordWASM
        cd ~/discordWASM
        
        # Injection des secrets pour le build Docker
        export PRIMARY_PIN_HASH="${{ secrets.PRIMARY_PIN_HASH }}"
        export BACKUP_PIN_HASH="${{ secrets.BACKUP_PIN_HASH }}"
        
        # Déploiement avec héritage des variables (-E)
        if sudo docker compose version &> /dev/null; then
          sudo -E docker compose up -d --build signaling-server
        else
          sudo -E docker-compose up -d --build signaling-server
        fi
        
        # Nettoyage des anciennes images inutilisées (évite saturation disque VM)
        sudo docker image prune -f
        
        # Ménage archive
        rm -f ~/discordWASM-deploy/deploy.tar.gz