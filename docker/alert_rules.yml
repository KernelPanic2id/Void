groups:
  - name: sfu_alerts
    interval: 10s
    rules:
      - alert: SFUServiceDown
        expr: up{job="signaling-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SFU WebRTC est hors ligne"
          description: "Le serveur SFU n'est pas accessible depuis {{ $value | humanizeDuration }}."

      - alert: HighBandwidthUsage
        expr: sfu_bandwidth_egress_bps > 800000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Bande passante > 800 Mbps"
          description: "La bande passante sortante est à {{ ($value / 1000000) | humanize }} Mbps"

      - alert: HighConnectionCount
        expr: sfu_active_peers > 150
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Trop de connexions ({{ $value }})"
          description: "Le nombre de pairs connectés dépasse 150"

      - alert: CriticalConnectionCount
        expr: sfu_active_peers > 200
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Connexions critiques ({{ $value }})"
          description: "URGENT: Plus de 200 connexions simultanées"