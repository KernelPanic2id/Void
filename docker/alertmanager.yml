global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'REPLACE_DOMAIN'
  smtp_auth_username: 'REPLACE_SMTP_USER'
  smtp_auth_password: 'REPLACE_SMTP_PASSWORD'
  slack_api_url: 'REPLACE_SLACK_WEBHOOK'


route:
  receiver: 'slack-all'
  group_by: ['alertname', 'severity', 'instance']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        alertname: FraudIPBanned
      receiver: 'slack-fraud'
      continue: false
    - match:
        alertname: HighBlockedRequests
      receiver: 'slack-fraud'
      continue: false
    - match:
        severity: critical
      receiver: 'slack-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'email-default'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

receivers:
  - name: 'email-default'
    email_configs:
      - to: 'ton-email@gmail.com'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} - {{ .GroupLabels.instance }}'
        html: |
          <h2>Alerte: {{ .GroupLabels.alertname }}</h2>
          <p><strong>État:</strong> {{ .Status | toUpper }}</p>
          <p><strong>Sévérité:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>Instance:</strong> {{ .GroupLabels.instance }}</p>
          <hr>
          {{ range .Alerts }}
          <div style="margin: 10px 0; padding: 10px; background: #f5f5f5;">
            <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
            <p><strong>Description:</strong> {{ .Annotations.description }}</p>
            <p><strong>Started:</strong> {{ .StartsAt | humanizeDuration }} ago</p>
          </div>
          {{ end }}

  - name: 'slack-critical'
    slack_configs:
      - channel: '#sfu-alerts-critical'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        title_link: 'http://localhost:3000/explore'
        pretext: 'Alerte critique SFU WebRTC'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        fields:
          - title: 'Sévérité'
            value: '{{ .GroupLabels.severity }}'
            short: true
          - title: 'Instance'
            value: '{{ .GroupLabels.instance }}'
            short: true
          - title: 'Début'
            value: '{{ .CommonLabels.alertname }}'
            short: true
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt }}
          {{ end }}

  - name: 'slack-all'
    slack_configs:
      - channel: '#sfu-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          {{ end }}

  - name: 'slack-fraud'
    slack_configs:
      - channel: '#fraud-alerts'
        send_resolved: true
        title: '🚨 [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        pretext: 'Fraud / Piracy Alert — Void'
        fields:
          - title: 'Alert'
            value: '{{ .GroupLabels.alertname }}'
            short: true
          - title: 'Severity'
            value: '{{ .GroupLabels.severity }}'
            short: true
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt }}
          {{ end }}
