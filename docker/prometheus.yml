global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    monitor: 'discord-wasm-sfu'
    environment: 'production'
    server: 'oracle-cloud'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'signaling-server'
    scheme: 'https'
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['89.168.59.45:3001']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']